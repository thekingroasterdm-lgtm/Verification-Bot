<!DOCTYPE html>
<html lang="en">
<head>
    <title>Verification Successful - SM GrowMart HQ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f9fafb; overflow-x: hidden; }
        .display-font { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative selection:bg-emerald-500/30">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-600/20 rounded-full blur-[128px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-600/20 rounded-full blur-[128px]"></div>
    </div>
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 z-10 shadow-2xl relative overflow-hidden transform transition-all duration-500 hover:scale-[1.01]">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
        <div class="mx-auto w-20 h-20 bg-gradient-to-br from-emerald-400/20 to-teal-500/20 rounded-2xl flex items-center justify-center border border-emerald-500/30 shadow-[0_0_40px_-10px_rgba(16,185,129,0.4)] mb-8">
            <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <div class="text-center space-y-3 mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white drop-shadow-sm display-font">Access Granted</h1>
            <p class="text-zinc-400 text-sm">Authenticated successfully as <span class="text-white font-semibold bg-white/5 py-1 px-2 rounded-md">{username}</span></p>
        </div>
        <div class="bg-black/40 rounded-2xl p-5 border border-white/5 space-y-4">
            <div class="flex items-center gap-3 text-emerald-400 font-medium pb-4 border-b border-white/5 text-sm">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                System Synchronized
            </div>
            <ul class="text-sm text-zinc-400 space-y-3">
                <li class="flex items-start gap-2">
                    <svg class="w-5 h-5 text-emerald-500/80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span>Role allocation correctly dispatched</span>
                </li>
                <li class="flex items-start gap-2">
                    <svg class="w-5 h-5 text-emerald-500/80 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span>Channel access instantly unlocked</span>
                </li>
            </ul>
        </div>
        <button onclick="window.close()" class="mt-8 w-full py-3.5 bg-white/5 hover:bg-white/10 text-white font-medium rounded-xl transition duration-300 border border-white/10 flex items-center justify-center gap-2">
            Return to Discord
        </button>
    </div>
</body>
</html>
